# Local dev: build with Dockerfile.local, port 80, maas-shared network.
# Environment: LOCAL MACHINE ONLY — do not use docker-compose.yml locally.
version: '3.8'

services:
  maas-front:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: maas-front
    ports:
      - "80:80"
    environment:
      - CORS_ORIGINS=["*"]
      - CORS_ALLOW_CREDENTIALS=true
      - CORS_ALLOW_METHODS=["*"]
      - CORS_ALLOW_HEADERS=["*"]
      - VITE_API_BASE=/api/v3
      - VITE_BASE_PATH=/
    restart: unless-stopped
    networks:
      - maas-shared

networks:
  maas-shared:
    external: true
