<!DOCTYPE html>
<html lang="ru" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <title>Подтверждение регистрации — MAAS АЭРОМАКС</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap');

    body,
    table,
    td,
    p,
    a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }

    table,
    td {
      mso-table-lspace: 0pt;
      mso-table-rspace: 0pt;
    }

    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      outline: none;
      text-decoration: none;
      display: block;
    }

    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      background-color: #cbd1d5;
    }

    .email-body {
      font-family: 'Montserrat', Arial, Helvetica, sans-serif;
    }

    @media only screen and (max-width: 620px) {
      .email-container {
        width: 100% !important;
      }

      .content-padding {
        padding-left: 20px !important;
        padding-right: 20px !important;
      }

      .hero-illustration img {
        width: 200px !important;
        height: auto !important;
      }

      .title-text {
        font-size: 28px !important;
        line-height: 34px !important;
      }

      .body-text {
        font-size: 16px !important;
        line-height: 24px !important;
      }

      .greeting-text {
        font-size: 24px !important;
        line-height: 30px !important;
      }

      .instruction-text {
        font-size: 18px !important;
        line-height: 26px !important;
      }

      .cta-button {
        font-size: 18px !important;
        padding: 14px 32px !important;
      }
    }
  </style>
</head>
<body class="email-body" style="margin:0;padding:0;background-color:#cbd1d5;">
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
    Подтвердите регистрацию в MAAS АЭРОМАКС
  </div>

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#cbd1d5;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <!--[if mso]>
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0"><tr><td>
        <![endif]-->

        <table role="presentation" class="email-container" width="600" cellspacing="0" cellpadding="0" border="0" style="width:600px;max-width:600px;background-color:#ffffff;border-radius:20px;">
          <!-- Hero: left column (logo + title + body) + right illustration -->
          <tr>
            <td class="content-padding" style="padding:5px 28px 0 28px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td valign="top" width="52%" style="padding:29px 0 0 0;vertical-align:top;">
                    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="padding:0 0 64px 0;">
                          <img src="./assets/logo.png" width="121" height="23" alt="MAAS АЭРОМАКС" style="width:121px;height:23px;" />
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:0;">
                          <p class="title-text" style="margin:0;font-family:'Montserrat',Arial,Helvetica,sans-serif;font-size:40px;line-height:48px;font-weight:700;color:#000000;">
                            Подтверждение<br />регистрации
                          </p>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:21px 0 0 0;">
                          <p class="body-text" style="margin:0;font-family:'Montserrat',Arial,Helvetica,sans-serif;font-size:24px;line-height:34px;font-weight:500;color:#000000;">
                            Мы получили запрос<br />
                            на подтверждение для вашей учетной записи <span style="font-weight:700;color:#e84261;">MAAS АЭРОМАКС</span>
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td valign="top" align="right" width="48%" rowspan="1" class="hero-illustration" style="padding:0;vertical-align:top;line-height:0;">
                    <img src="./assets/illustration.png" width="288" height="288" alt="" style="width:288px;height:288px;" />
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CTA block -->
          <tr>
            <td class="content-padding" style="padding:32px 28px 34px 28px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#e1e4e6;border-radius:20px;">
                <tr>
                  <td align="center" style="padding:25px 28px 28px 28px;">
                    <p class="greeting-text" style="margin:0;font-family:'Montserrat',Arial,Helvetica,sans-serif;font-size:32px;line-height:39px;font-weight:700;color:#000000;text-align:center;">
                      Здраствуйте!
                    </p>
                    <p class="instruction-text" style="margin:20px 0 0 0;font-family:'Montserrat',Arial,Helvetica,sans-serif;font-size:28px;line-height:34px;font-weight:500;color:#000000;text-align:center;">
                      Нажмите кнопку, чтобы подтвердить регистрацию
                    </p>

                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin:30px auto 0 auto;">
                      <tr>
                        <td align="center" style="border-radius:45px;background-color:#e84261;">
                          <!--[if mso]>
                          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:office" href="{{CONFIRMATION_URL}}" style="height:60px;v-text-anchor:middle;width:320px;" arcsize="50%" stroke="f" fillcolor="#e84261">
                            <w:anchorlock/>
                            <center style="color:#ffffff;font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:bold;">
                              Подтвердить почту
                            </center>
                          </v:roundrect>
                          <![endif]-->
                          <!--[if !mso]><!-->
                          <a
                            href="{{CONFIRMATION_URL}}"
                            class="cta-button"
                            target="_blank"
                            style="display:inline-block;padding:15px 40px;font-family:'Montserrat',Arial,Helvetica,sans-serif;font-size:30px;line-height:37px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:45px;background-color:#e84261;"
                          >
                            Подтвердить почту
                          </a>
                          <!--<![endif]-->
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>

        <!--[if mso]>
        </td></tr></table>
        <![endif]-->
      </td>
    </tr>
  </table>
</body>
</html>
